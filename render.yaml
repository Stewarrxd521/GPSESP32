services:
  - type: web
    name: gps-esp32-tracker
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: gps-db
          property: connectionString
      - key: MQTT_HOST
        value: 5022a5cb4cc744049a477ca9676481fd.s1.eu.hivemq.cloud
      - key: MQTT_PORT
        value: "8883"
      - key: MQTT_USER
        sync: false
      - key: MQTT_PASSWORD
        sync: false
      - key: MQTT_TOPIC
        value: vehicles/+/gps
      - key: MQTT_TLS
        value: "true"

databases:
  - name: gps-db
    databaseName: gps
    user: gps
